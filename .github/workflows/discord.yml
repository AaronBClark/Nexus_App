name: Discord Notify

on:
  push:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to report (blank = default branch)"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch enough history to build commit lists when possible
          fetch-depth: 50
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Build payload + send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "Missing secret: DISCORD_WEBHOOK_URL"
            exit 1
          fi

          COMMIT_SHA="$(git rev-parse HEAD)"
          COMMIT_URL="${REPO_URL}/commit/${COMMIT_SHA}"

          # Build compare URL when possible (push event has before/after)
          COMPARE_URL=""
          if [ "${EVENT_NAME}" = "push" ] && [ -n "${BEFORE:-}" ] && [ -n "${AFTER:-}" ]; then
            COMPARE_URL="${REPO_URL}/compare/${BEFORE}...${AFTER}"
          fi

          # Collect commits (up to 10) with FULL message body using %B.
          # We'll delimit records so Python can parse reliably.
          COMMITS_RAW=""
          if [ "${EVENT_NAME}" = "push" ] && [ -n "${BEFORE:-}" ] && [ -n "${AFTER:-}" ]; then
            # Range excludes BEFORE, includes AFTER
            COMMITS_RAW="$(git log "${BEFORE}..${AFTER}" -n 10 --pretty=format:'%H%x1f%an%x1f%B%x1e' || true)"
          else
            COMMITS_RAW="$(git log -n 1 --pretty=format:'%H%x1f%an%x1f%B%x1e' || true)"
          fi

          export COMMIT_SHA COMMIT_URL COMPARE_URL COMMITS_RAW

          python3 - <<'PY' > payload.json
          import json, os, re
          
          repo = os.environ["REPO"]
          ref = os.environ["REF_NAME"]
          event = os.environ["EVENT_NAME"]
          repo_url = os.environ["REPO_URL"]
          
          commit_sha = os.environ["COMMIT_SHA"]
          compare_url = os.environ.get("COMPARE_URL", "")
          commits_raw = os.environ.get("COMMITS_RAW", "")
          
          EMBED_DESC_MAX = 4096
          TITLE_MAX = 256
          
          DIVIDER = "────────────"
          
          def squash_ws(s: str) -> str:
              s = s.replace("\r\n", "\n").replace("\r", "\n")
              s = re.sub(r"\n{3,}", "\n\n", s)
              return s.strip()
          
          def trunc(s: str, max_len: int) -> str:
              if len(s) <= max_len:
                  return s
              return s[: max_len - 1] + "…"
          
          # Parse records split by 0x1e, fields split by 0x1f
          commits = []
          for rec in commits_raw.split("\x1e"):
              if not rec.strip():
                  continue
              parts = rec.split("\x1f")
              if len(parts) < 3:
                  continue
              sha, author, body = parts[0].strip(), parts[1].strip(), parts[2]
              body = squash_ws(body)
              subject = body.split("\n", 1)[0] if body else "(no message)"
              rest = body[len(subject):].lstrip("\n") if body else ""
              commits.append({
                  "sha": sha,
                  "short": sha[:7],
                  "author": author or "Unknown",
                  "subject": subject,
                  "body": rest,
                  "url": f"{repo_url}/commit/{sha}",
              })
          
          latest = commits[0] if commits else {"subject":"(none)","author":"Unknown","url":repo_url,"short":commit_sha[:7], "body":""}
          
          title = trunc(f"{repo} • {event} • {ref}", TITLE_MAX)
          
          # Header lines
          lines = [
              f"**Latest:** [{latest['subject']}]({latest['url']})",
              f"**Author:** {latest['author']}",
          ]
          if compare_url:
              lines.append(f"**Compare:** {compare_url}")
          
          # Commit list
          lines.append("")
          lines.append("**Commits:**")
          
          # Build commit blocks until we hit embed limit
          for i, c in enumerate(commits[:10]):
              # Bold subject, keep SHA + author secondary
              block = [f"**{c['subject']}** (`{c['short']}`) by {c['author']}"]
              # Optional: include body, indented
              if c["body"]:
                  # Keep bodies readable, but don’t let them dominate
                  body = c["body"]
                  # Trim extreme bodies early (still overall clamped later)
                  body = trunc(body, 700)
                  # Indent body lines for scanability
                  body = "\n".join("  " + ln for ln in body.split("\n"))
                  block.append(body)
              # Add a link line (small + consistent target)
              block.append(f"[view commit]({c['url']})")
          
              # Add divider between commits (not after last)
              if i < min(len(commits), 10) - 1:
                  block.append(DIVIDER)
          
              candidate = "\n".join(lines + ["", "\n".join(block)])
              if len(candidate) > EMBED_DESC_MAX:
                  break
              lines += ["", "\n".join(block)]
          
          description = trunc("\n".join(lines), EMBED_DESC_MAX)
          
          payload = {
              "embeds": [{
                  "title": title,
                  "url": compare_url or repo_url,
                  "description": description,
                  "footer": {"text": f"SHA: {commit_sha}"},
                  "color": 0x57F287 if event == "push" else 0x5865F2,
              }]
          }
          
          print(json.dumps(payload))
          PY

          echo "Payload:"
          cat payload.json

          curl -f -sS -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL"
