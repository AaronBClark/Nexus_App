name: Discord Notify

on:
  push:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to report (blank = default branch)"
        required: false
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch enough history to build commit lists when possible
          fetch-depth: 50
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Build payload + send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "Missing secret: DISCORD_WEBHOOK_URL"
            exit 1
          fi

          # Latest commit info from the checked-out ref (works for both push + manual)
          COMMIT_SHA="$(git rev-parse HEAD)"
          COMMIT_MSG="$(git log -1 --pretty=%s)"
          COMMIT_AUTHOR="$(git log -1 --pretty=%an)"
          COMMIT_URL="${REPO_URL}/commit/${COMMIT_SHA}"

          # Build compare URL when possible (push event has before/after)
          COMPARE_URL=""
          if [ "${EVENT_NAME}" = "push" ] && [ -n "${BEFORE:-}" ] && [ -n "${AFTER:-}" ]; then
            COMPARE_URL="${REPO_URL}/compare/${BEFORE}...${AFTER}"
          fi

          # Collect up to 5 commits for push events, otherwise just the latest
          COMMITS_TEXT=""
          if [ "${EVENT_NAME}" = "push" ]; then
            if [ -n "$COMPARE_URL" ]; then
              COMMITS_TEXT="$(git log --pretty='- %s (%h)' "${BEFORE}..${AFTER}" | head -n 5 || true)"
            else
              COMMITS_TEXT="$(git log -5 --pretty='- %s (%h)' || true)"
            fi
          else
            COMMITS_TEXT="- ${COMMIT_MSG} ($(git rev-parse --short HEAD))"
          fi

          # Make shell vars visible to Python
          export COMMIT_SHA COMMIT_MSG COMMIT_AUTHOR COMMIT_URL COMPARE_URL COMMITS_TEXT

          python3 - <<'PY' > payload.json
          import json, os

          repo = os.environ["REPO"]
          ref = os.environ["REF_NAME"]
          event = os.environ["EVENT_NAME"]
          repo_url = os.environ["REPO_URL"]

          commit_sha = os.environ["COMMIT_SHA"]
          commit_msg = os.environ["COMMIT_MSG"]
          commit_author = os.environ["COMMIT_AUTHOR"]
          commit_url = os.environ["COMMIT_URL"]
          compare_url = os.environ.get("COMPARE_URL", "")
          commits_text = os.environ.get("COMMITS_TEXT", "")

          title = f"{repo} • {event} • {ref}"

          lines = [
              f"**Latest:** [{commit_msg}]({commit_url})",
              f"**Author:** {commit_author}",
          ]
          if compare_url:
              lines.append(f"**Compare:** {compare_url}")
          lines += ["", "**Commits:**", commits_text or "- (none)"]

          payload = {
              "embeds": [{
                  "title": title,
                  "url": repo_url,
                  "description": "\n".join(lines),
                  "footer": {"text": f"SHA: {commit_sha}"},
              }]
          }

          print(json.dumps(payload))
          PY

          echo "Payload:"
          cat payload.json

          curl -f -sS -H "Content-Type: application/json" \
            -d @payload.json \
            "$DISCORD_WEBHOOK_URL"